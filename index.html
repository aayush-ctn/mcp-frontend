<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── LOGIN ─────────────────────────────────────────────────────── -->
<div id="api-screen" class="screen">
    <div class="login-card">
        <div class="login-logo">⚡</div>
        <h2>MCP Dashboard</h2>
        <p class="login-sub">Enter your username to sign in</p>
        <input id="user-name" placeholder="Username" autocomplete="username">
        <button onclick="loginUser()">Sign In</button>
        <div class="login-divider"><span>or</span></div>
        <button class="btn-ghost btn-full" onclick="createUser()">Create Account</button>
        <p id="api-error"></p>
    </div>
</div>


<!-- ── PROJECTS ──────────────────────────────────────────────────── -->
<div id="project-screen" class="screen hidden">
    <div class="page-header">
        <div>
            <h2>Projects</h2>
            <p class="page-sub">Select a project to manage its tools</p>
        </div>
        <button class="btn-ghost btn-sm" onclick="logout()">Sign Out</button>
    </div>
    <div id="project-list"></div>
    <div class="create-box">
        <h3>New Project</h3>
        <input id="project-name" placeholder="Project name *">
        <textarea id="project-desc" placeholder="Description (optional)"></textarea>
        <button id="create-project-btn" onclick="createProject()">Create Project</button>
    </div>
</div>


<!-- ── TOOLS ─────────────────────────────────────────────────────── -->
<div id="tool-screen" class="screen hidden">
    <div class="page-header">
        <div>
            <h2>Tools</h2>
            <span id="active-project-label" class="project-pill"></span>
        </div>
        <div class="header-btns">
            <button class="btn-ghost" onclick="showScreen('project-screen'); loadProjects()">← Projects</button>
            <button onclick="goToApiKeyScreen()">Go to Chat →</button>
        </div>
    </div>
    <div id="tool-list"></div>
    <div class="create-box">
        <h3>New Tool</h3>
        <div class="form-row">
            <input id="tool-name" placeholder="Tool name * (letters, numbers, underscores)">
            <select id="tool-method">
                <option value="GET">GET</option>
                <option value="POST">POST</option>
                <option value="PUT">PUT</option>
                <option value="PATCH">PATCH</option>
                <option value="DELETE">DELETE</option>
            </select>
        </div>
        <input id="tool-url" placeholder="API URL *  e.g. https://api.example.com/endpoint">
        <textarea id="tool-description" placeholder="Description * (what does this tool do?)"></textarea>
        <textarea id="tool-headers" placeholder='Headers JSON  e.g. {"Content-Type":"application/json"}'></textarea>
        <!-- Query Params -->
        <div class="param-section">
            <div class="param-section-header">
                <span class="param-section-label">Query Parameters</span>
                <button type="button" class="btn-add-param" onclick="addParamRow('query-params-list')">+ Add</button>
            </div>
            <div id="query-params-list" class="param-list">
                <!-- rows injected by JS -->
            </div>
        </div>

        <!-- Body Params -->
        <div class="param-section">
            <div class="param-section-header">
                <span class="param-section-label">Body Parameters</span>
                <button type="button" class="btn-add-param" onclick="addParamRow('body-params-list')">+ Add</button>
            </div>
            <div id="body-params-list" class="param-list">
                <!-- rows injected by JS -->
            </div>
        </div>
        <div class="auth-section">
            <label class="auth-toggle-label">
                <input type="checkbox" id="tool-auth-required" onchange="toggleAuthFields()">
                <span>This tool requires authentication</span>
            </label>
            <div id="auth-fields" class="auth-fields hidden">
                <select id="tool-auth-type">
                    <option value="bearer">Bearer Token</option>
                    <option value="api_key">API Key</option>
                    <option value="basic">Basic Auth</option>
                </select>
            </div>
        </div>
        <button id="create-tool-btn" onclick="createTool()">Create Tool</button>
    </div>
</div>


<!-- ── API KEY SETUP ──────────────────────────────────────────────── -->
<div id="apikey-screen" class="screen hidden">
    <div class="login-card">
        <div class="login-logo">🔑</div>
        <h2>Set API Key</h2>
        <p class="login-sub">Enter your LLM API key to start chatting</p>
        <input id="chat-api-key" placeholder="API Key" type="password">
        <button onclick="setApiKeyAndGoToChat()">Start Chatting</button>
        <button class="btn-ghost btn-full" onclick="goToTools()">← Back to Tools</button>
        <p id="apikey-error"></p>
    </div>
</div>


<!-- ── CHAT ───────────────────────────────────────────────────────── -->
<div id="chat-screen" class="screen hidden">
    <div class="chat-layout">

        <!-- Sidebar -->
        <div class="tool-sidebar">
            <div class="sidebar-header">
                <div>
                    <h3>Tools</h3>
                    <span id="chat-project-label" class="project-pill"></span>
                </div>
                <button class="btn-ghost btn-sm" onclick="goToTools()">← Back</button>
            </div>
            <p class="sidebar-hint">Toggle tools on/off for this chat session</p>
            <div id="chat-tools"></div>
        </div>

        <!-- Chat -->
        <div class="chat-area">
            <div id="chat-box"></div>
            <div class="chat-input-row">
                <input id="message-input" placeholder="Type a message and press Enter..."
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

    </div>
</div>


<!-- ── AUTH MODAL ─────────────────────────────────────────────────── -->
<div id="auth-modal" class="modal-overlay hidden">
    <div class="modal-card">
        <h3 id="auth-modal-title">Provide Authentication</h3>
        <p id="auth-modal-desc" class="modal-desc"></p>

        <label class="modal-label">Header Name</label>
        <input id="auth-modal-header-key" placeholder='e.g. X-Api-Key, Authorization, apikey'>
        <p class="modal-field-hint" id="auth-modal-header-hint"></p>

        <label class="modal-label">Value</label>
        <input id="auth-modal-value" placeholder="Enter credential value..." type="password">

        <div class="modal-btns">
            <button class="btn-ghost" onclick="closeAuthModal()">Cancel</button>
            <button onclick="confirmSaveToolAuth()">Save &amp; Continue</button>
        </div>
        <p id="auth-modal-error"></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
